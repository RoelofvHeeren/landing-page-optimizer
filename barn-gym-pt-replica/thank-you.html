    <script>
        window.GADS_ID = '';

    <script>
        async function trackEvent(event_type, event_data = {}) {
            const SESSION_ID = sessionStorage.getItem('bg_session');
            const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://join.barn-gym.com';

            // PostHog
            if (window.posthog) posthog.capture(event_type, { ...event_data, page: window.PAGE_SOURCE_PREFIX });

            // Internal Dashboard
            fetch(API_BASE + '/api/events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: SESSION_ID, page: 'pt', event_type, event_data })
            }).catch(() => { });
        }
    </script>

    <style>
        :root {
            --primary: #007559;
            --text: #131415;
            --font-serif: 'Playfair Display', serif;

        body {
            margin: 0;
            font-family: var(--font-sans);
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('/images/IMG_9676.jpg');

            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            display: flex;

            justify-content: center;

            text-align: center;

        }

        .card {
            background: #ffffff;
            padding: 70px 50px;
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            max-width: 650px;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 52px;
            margin-bottom: 25px;
            color: var(--primary);
            line-height: 1.1;
        }

        p {
            font-size: 20px;
            line-height: 1.7;
            color: #444;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background: var(--text);
            color: white;
            padding: 20px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 15px;
            font-family: var(--font-serif);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 25px;
            }

            h1 {
                font-size: 38px;
            }

            p {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

        <div style="margin-top: 40px;">
